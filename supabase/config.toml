# https://supabase.com/docs/guides/cli/config

[functions.vsl-survey-import]
verify_jwt = false

# Supabase can issue user JWTs with ES256; the API gateway for Edge Functions may reject
# them with UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM while verify_jwt is true. The function
# still enforces auth via supabase.auth.getUser() in index.ts.
[functions.vsl-sentinel-statistics]
verify_jwt = false
