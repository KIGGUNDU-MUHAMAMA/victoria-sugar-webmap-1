<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victoria Sugar | Sign In</title>
  <link rel="icon" type="image/jpeg" href="./assets/victoria-sugar-logo.jpg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config/app-config.js"></script>
</head>
<body>
  <main class="login-shell">
    <section class="login-brand">
      <img class="login-brand__logo" src="./assets/victoria-sugar-logo.jpg" alt="Victoria Sugar Limited">
      <h1>Victoria Sugar Limited</h1>
      <p>Land intelligence platform for sugarcane blocks and parcels.</p>
      <div class="cane-strip"></div>
      <p class="small">
        Agricultural mapping, survey workflows, and operational parcel tracking.
      </p>
    </section>

    <section class="login-panel">
      <div class="card">
        <div class="auth-tabs">
          <button id="tabSignIn" class="auth-tab active" type="button">Sign In</button>
          <button id="tabSignUp" class="auth-tab" type="button">Create Account</button>
        </div>

        <div id="panelSignIn" class="auth-panel">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username">

          <label for="password">Password</label>
          <div class="password-wrapper">
            <input id="password" type="password" autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePwd('password', this)">Show</button>
          </div>

          <button id="signInBtn" type="button">Sign In</button>

          <div class="group">
            <button id="forgotBtn" class="btn-secondary" type="button">Forgot Password</button>
          </div>
        </div>

        <div id="panelSignUp" class="auth-panel" hidden>
          <label for="newEmail">Email</label>
          <input id="newEmail" type="email">

          <label for="newPassword">Password</label>
          <div class="password-wrapper">
            <input id="newPassword" type="password">
            <button type="button" class="toggle-password" onclick="togglePwd('newPassword', this)">Show</button>
          </div>

          <label for="role">Role</label>
          <select id="role">
            <option value="ADMIN">ADMIN</option>
            <option value="SURVEYOR">SURVEYOR</option>
            <option value="MANAGMENT">MANAGMENT</option>
          </select>

          <button id="signUpBtn" type="button">Create User</button>
        </div>

        <p class="small auth-help">After you sign in, you will be taken to the map. Create an account above if you do not have one yet.</p>

        <div id="status" class="status" hidden></div>
      </div>
    </section>
  </main>

  <script>
    const tabSignIn = document.getElementById("tabSignIn");
    const tabSignUp = document.getElementById("tabSignUp");
    const panelSignIn = document.getElementById("panelSignIn");
    const panelSignUp = document.getElementById("panelSignUp");
    const statusElInline = document.getElementById("status");

    function clearStatusInline() {
      if (statusElInline) {
        statusElInline.hidden = true;
        statusElInline.textContent = "";
        statusElInline.classList.remove("error");
      }
    }

    if (tabSignIn && tabSignUp) {
      tabSignIn.addEventListener("click", () => {
        tabSignIn.classList.add("active");
        tabSignUp.classList.remove("active");
        panelSignIn.hidden = false;
        panelSignUp.hidden = true;
        clearStatusInline();
      });
      tabSignUp.addEventListener("click", () => {
        tabSignUp.classList.add("active");
        tabSignIn.classList.remove("active");
        panelSignUp.hidden = false;
        panelSignIn.hidden = true;
        clearStatusInline();
      });
    }

    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
      } else {
        input.type = "password";
        btn.textContent = "Show";
      }
    }
  </script>
  <script type="module" src="./js/auth.js?v=5"></script>
</body>
</html>
